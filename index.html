<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Table</title>
    <script>
        async function fetchData() {
            const response = await fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vQelcb6cJc-9YEhnmNyRSGdg2yHBK0axkuaIwzPnMNkoYVt59-DiShsE48Xmf82xEIcm4xnYZSlc3OC/pub?gid=2113544751&single=true&output=csv');
            const data = await response.text();
            const rows = data.split('\n').map(row => row.split(','));
            displayTable(rows);
        }

        function displayTable(rows) {
            const table = document.getElementById('data-table');
            table.innerHTML = '';
            rows.forEach(row => {
                const tr = document.createElement('tr');
                row.forEach(cell => {
                    const td = document.createElement('td');
                    td.textContent = cell;
                    tr.appendChild(td);
                });
                table.appendChild(tr);
            });
        }

        setInterval(fetchData, 30000);
        window.onload = fetchData;
    </script>
</head>
<body>
    <h1>Data from Google Sheets</h1>
    <table id="data-table" border="1"></table>
</body>
</html>
