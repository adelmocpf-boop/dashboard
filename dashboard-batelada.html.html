<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Planilha em Tempo Real</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      text-align: center;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      background: white;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #4CAF50;
      color: white;
    }
  </style>
</head>
<body>

<h1>Dados da Planilha</h1>
<table id="tabela"></table>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQelcb6cJc-9YEhnmNyRSGdg2yHBK0axkuaIwzPnMNkoYVt59-DiShsE48Xmf82xEIcm4xnYZSlc3OC/pub?gid=2113544751&single=true&output=csv";

async function carregarCSV() {
  try {
    const response = await fetch(url);
    const data = await response.text();

    const linhas = data.split("\n").map(l => l.split(","));
    const tabela = document.getElementById("tabela");

    tabela.innerHTML = "";

    linhas.forEach((linha, index) => {
      const tr = document.createElement("tr");

      linha.forEach(coluna => {
        const cell = document.createElement(index === 0 ? "th" : "td");
        cell.textContent = coluna;
        tr.appendChild(cell);
      });

      tabela.appendChild(tr);
    });
  } catch (erro) {
    console.error("Erro ao carregar CSV:", erro);
  }
}

// Carrega imediatamente
carregarCSV();

// Atualiza a cada 60 segundos (60000 ms)
setInterval(carregarCSV, 60000);
</script>

</body>
</html>
